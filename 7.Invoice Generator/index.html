<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Invoice Builder</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --accent: #06b6d4;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --radius: 10px;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .app-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(79,70,229,.3);
    }
    .app-header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -.3px; }
    .app-header h1 span { opacity: .7; font-weight: 400; font-size: .9rem; margin-left: 10px; }
    .header-actions { display: flex; gap: 10px; }

    .container { max-width: 1200px; margin: 0 auto; padding: 28px 20px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: .8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .card-title svg { color: var(--primary); }

    /* ── Forms ── */
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .field input, .field textarea, .field select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      font-size: .93rem;
      color: var(--text);
      background: #fff;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
      font-family: inherit;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,.1);
    }
    .field textarea { resize: vertical; min-height: 70px; }
    .field-row { display: grid; gap: 12px; }
    .field-row.cols-2 { grid-template-columns: 1fr 1fr; }
    .field-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border: none;
      border-radius: 7px;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s, box-shadow .15s;
      font-family: inherit;
      text-decoration: none;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); box-shadow: 0 4px 12px rgba(79,70,229,.35); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #059669; box-shadow: 0 4px 12px rgba(16,185,129,.3); }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { background: #0891b2; }
    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); background: rgba(79,70,229,.04); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-sm { padding: 5px 11px; font-size: .8rem; }
    .btn-icon { padding: 7px; border-radius: 6px; }

    /* ── Items Table ── */
    .items-section { margin-top: 20px; }
    .items-table { width: 100%; border-collapse: collapse; }
    .items-table th {
      background: #f1f5f9;
      padding: 10px 12px;
      text-align: left;
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      border-bottom: 2px solid var(--border);
    }
    .items-table th:last-child { text-align: right; width: 60px; }
    .items-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .items-table tr:hover td { background: #fafbfc; }
    .items-table td input {
      width: 100%;
      padding: 7px 9px;
      border: 1.5px solid transparent;
      border-radius: 6px;
      font-size: .9rem;
      background: transparent;
      color: var(--text);
      transition: border-color .15s, background .15s;
      font-family: inherit;
      outline: none;
    }
    .items-table td input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 2px rgba(79,70,229,.09);
    }
    .items-table td .line-total {
      font-weight: 700;
      color: var(--primary);
      font-size: .92rem;
      text-align: right;
      display: block;
      min-width: 80px;
    }
    .col-desc { min-width: 200px; }
    .col-qty { width: 90px; }
    .col-price { width: 120px; }
    .col-total { width: 110px; text-align: right; }
    .col-action { width: 50px; text-align: center; }

    .add-item-row { margin-top: 12px; }

    /* ── Totals ── */
    .totals-box {
      margin-top: 16px;
      margin-left: auto;
      width: 320px;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 16px 20px;
    }
    .totals-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      font-size: .91rem;
    }
    .totals-row .label { color: var(--muted); font-weight: 500; }
    .totals-row .value { font-weight: 600; }
    .totals-divider { border: none; border-top: 1px dashed var(--border); margin: 8px 0; }
    .totals-row.grand { padding-top: 10px; }
    .totals-row.grand .label { font-size: 1rem; font-weight: 700; color: var(--text); }
    .totals-row.grand .value { font-size: 1.15rem; font-weight: 800; color: var(--primary); }

    .discount-tax-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .discount-tax-row .field { margin-bottom: 0; flex: 1; min-width: 130px; }

    /* ── Notes ── */
    .notes-section { margin-top: 20px; }

    /* ── Tab Navigation ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: #e8eaf0; padding: 4px; border-radius: 9px; width: fit-content; }
    .tab-btn {
      padding: 9px 20px;
      border: none;
      background: transparent;
      border-radius: 7px;
      font-size: .88rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: background .15s, color .15s, box-shadow .15s;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
    }
    .tab-btn.active {
      background: #fff;
      color: var(--primary);
      box-shadow: 0 1px 5px rgba(0,0,0,.1);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Invoice Preview ── */
    #preview-panel { animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .invoice-preview {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 52px;
      max-width: 820px;
      margin: 0 auto;
      box-shadow: 0 4px 32px rgba(0,0,0,.08);
    }
    .inv-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
    .inv-company-name { font-size: 1.6rem; font-weight: 800; color: var(--primary); margin-bottom: 6px; }
    .inv-company-info { font-size: .85rem; color: var(--muted); line-height: 1.6; white-space: pre-line; }
    .inv-badge {
      text-align: right;
    }
    .inv-badge .inv-title {
      font-size: 2rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--primary);
      line-height: 1;
    }
    .inv-badge .inv-number { font-size: .92rem; color: var(--muted); margin-top: 4px; font-weight: 600; }
    .inv-badge .inv-date { font-size: .85rem; color: var(--muted); margin-top: 2px; }

    .inv-divider { border: none; border-top: 2px solid var(--primary); opacity: .15; margin: 20px 0; }

    .inv-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 36px; }
    .inv-meta-block .label {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .inv-meta-block .value { font-size: .92rem; font-weight: 600; color: var(--text); }
    .inv-meta-block .sub { font-size: .82rem; color: var(--muted); margin-top: 2px; }

    .inv-table { width: 100%; border-collapse: collapse; margin-bottom: 28px; }
    .inv-table thead tr { border-bottom: 2px solid var(--primary); }
    .inv-table th {
      padding: 10px 12px;
      text-align: left;
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--primary);
    }
    .inv-table th:nth-child(2), .inv-table th:nth-child(3) { text-align: center; }
    .inv-table th:nth-child(4) { text-align: right; }
    .inv-table td {
      padding: 12px;
      font-size: .9rem;
      border-bottom: 1px solid #f0f4f8;
      vertical-align: middle;
    }
    .inv-table td:nth-child(2), .inv-table td:nth-child(3) { text-align: center; color: var(--muted); }
    .inv-table td:nth-child(4) { text-align: right; font-weight: 600; }
    .inv-table tbody tr:last-child td { border-bottom: none; }
    .inv-table tbody tr:nth-child(even) td { background: #fafbfd; }

    .inv-totals { display: flex; justify-content: flex-end; margin-bottom: 32px; }
    .inv-totals-inner { min-width: 280px; }
    .inv-totals-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: .88rem; }
    .inv-totals-row .t-label { color: var(--muted); }
    .inv-totals-row .t-value { font-weight: 600; }
    .inv-totals-divider { border: none; border-top: 1.5px solid var(--border); margin: 8px 0; }
    .inv-grand-row { display: flex; justify-content: space-between; padding: 10px 14px; background: var(--primary); border-radius: 8px; margin-top: 6px; }
    .inv-grand-row .t-label, .inv-grand-row .t-value { color: #fff; font-weight: 800; font-size: 1rem; }

    .inv-notes { font-size: .84rem; color: var(--muted); border-top: 1px solid var(--border); padding-top: 20px; line-height: 1.7; }
    .inv-notes-label { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 5px; }
    .inv-footer { text-align: center; font-size: .78rem; color: #cbd5e1; margin-top: 28px; padding-top: 18px; border-top: 1px solid #f1f5f9; }

    /* ── Status Badge ── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .status-draft { background: #fef3c7; color: #b45309; }
    .status-final { background: #d1fae5; color: #065f46; }

    /* ── Invoice Number Display ── */
    .inv-number-display {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .inv-number-display input { flex: 1; }
    .inv-number-badge {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      border-radius: 6px;
      padding: 4px 11px;
      font-size: .8rem;
      font-weight: 700;
      white-space: nowrap;
    }

    /* ── Saved Invoices List ── */
    .saved-list { display: flex; flex-direction: column; gap: 10px; }
    .saved-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: border-color .15s, box-shadow .15s;
    }
    .saved-item:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(79,70,229,.08); }
    .saved-item-info .inv-num { font-weight: 700; font-size: .92rem; color: var(--primary); }
    .saved-item-info .client { font-size: .85rem; color: var(--muted); margin-top: 2px; }
    .saved-item-info .amount { font-size: .85rem; font-weight: 600; color: var(--text); }
    .saved-item-actions { display: flex; gap: 6px; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-state svg { opacity: .3; margin-bottom: 12px; }
    .empty-state p { font-size: .9rem; }

    /* ── Toast ── */
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      padding: 12px 18px;
      background: #1e293b;
      color: #fff;
      border-radius: 9px;
      font-size: .88rem;
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,.2);
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideIn .25s ease;
      max-width: 320px;
    }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    @keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: none; } }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .app-header { padding: 14px 16px; }
      .container { padding: 16px 12px; }
      .grid-2 { grid-template-columns: 1fr; }
      .totals-box { width: 100%; }
      .invoice-preview { padding: 24px 20px; }
      .inv-header { flex-direction: column; gap: 20px; }
      .inv-badge { text-align: left; }
      .inv-meta { grid-template-columns: 1fr; }
    }

    /* ── Print Styles ── */
    @media print {
      body * { visibility: hidden; }
      .invoice-preview, .invoice-preview * { visibility: visible; }
      .invoice-preview {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        border: none;
        box-shadow: none;
        border-radius: 0;
        padding: 30px 40px;
      }
      .app-header, .tabs, .tab-panel:not(#preview-panel) { display: none !important; }
    }

    /* ── Currency Symbol ── */
    .currency-select { width: auto; padding: 9px 10px; }

    /* ── Color Accents for drag handle ── */
    .drag-handle { cursor: grab; color: #cbd5e1; padding: 0 4px; user-select: none; }
    .drag-handle:hover { color: var(--muted); }
  </style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <h1>Invoice Builder <span id="current-inv-label">— New Invoice</span></h1>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="newInvoice()" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.3);color:#fff;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      New
    </button>
    <button class="btn btn-success" onclick="saveInvoice()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save
    </button>
  </div>
</header>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- App Body -->
<div class="container">

  <!-- Tabs -->
  <div class="tabs" role="tablist">
    <button class="tab-btn active" onclick="switchTab('editor')" id="tab-editor" role="tab">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4z"/></svg>
      Editor
    </button>
    <button class="tab-btn" onclick="switchTab('preview')" id="tab-preview" role="tab">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      Preview
    </button>
    <button class="tab-btn" onclick="switchTab('saved')" id="tab-saved" role="tab">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      Saved <span id="saved-count-badge" style="background:var(--primary);color:#fff;border-radius:10px;padding:1px 7px;font-size:.72rem;margin-left:3px;"></span>
    </button>
  </div>

  <!-- Editor Tab -->
  <div class="tab-panel active" id="editor-panel">
    <div class="grid-2">

      <!-- Company Info -->
      <div class="card">
        <div class="card-title">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
          Your Company
        </div>
        <div class="field">
          <label>Company Name</label>
          <input type="text" id="company-name" placeholder="Acme Corp." oninput="liveUpdate()"/>
        </div>
        <div class="field">
          <label>Address / Info</label>
          <textarea id="company-info" placeholder="123 Business Ave&#10;New York, NY 10001&#10;+1 (555) 000-0000" oninput="liveUpdate()"></textarea>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="company-email" placeholder="hello@acmecorp.com" oninput="liveUpdate()"/>
        </div>
        <div class="field">
          <label>Website</label>
          <input type="text" id="company-website" placeholder="www.acmecorp.com" oninput="liveUpdate()"/>
        </div>
      </div>

      <!-- Client Info & Invoice Meta -->
      <div class="card">
        <div class="card-title">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Client & Invoice Details
        </div>
        <div class="field-row cols-2">
          <div class="field">
            <label>Invoice #</label>
            <div class="inv-number-display">
              <input type="text" id="invoice-number" oninput="liveUpdate()"/>
              <span class="inv-number-badge" id="inv-num-badge">INV-001</span>
            </div>
          </div>
          <div class="field">
            <label>Currency</label>
            <select id="currency" class="currency-select" onchange="liveUpdate()">
              <option value="$">$ USD</option>
              <option value="€">€ EUR</option>
              <option value="£">£ GBP</option>
              <option value="¥">¥ JPY</option>
              <option value="₹">₹ INR</option>
              <option value="A$">A$ AUD</option>
              <option value="C$">C$ CAD</option>
              <option value="Fr">Fr CHF</option>
            </select>
          </div>
        </div>
        <div class="field-row cols-2">
          <div class="field">
            <label>Invoice Date</label>
            <input type="date" id="invoice-date" oninput="liveUpdate()"/>
          </div>
          <div class="field">
            <label>Due Date</label>
            <input type="date" id="due-date" oninput="liveUpdate()"/>
          </div>
        </div>
        <div class="field">
          <label>Client Name</label>
          <input type="text" id="client-name" placeholder="Jane Smith / Globex Inc." oninput="liveUpdate()"/>
        </div>
        <div class="field">
          <label>Client Email</label>
          <input type="email" id="client-email" placeholder="client@example.com" oninput="liveUpdate()"/>
        </div>
        <div class="field">
          <label>Client Address</label>
          <textarea id="client-address" placeholder="456 Client Street&#10;Los Angeles, CA 90001" oninput="liveUpdate()" style="min-height:55px;"></textarea>
        </div>
      </div>
    </div>

    <!-- Line Items -->
    <div class="card items-section" style="margin-top:20px;">
      <div class="card-title">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Line Items
      </div>
      <div style="overflow-x:auto;">
        <table class="items-table">
          <thead>
            <tr>
              <th class="col-desc">Description</th>
              <th class="col-qty">Qty</th>
              <th class="col-price">Unit Price</th>
              <th class="col-total">Total</th>
              <th class="col-action"></th>
            </tr>
          </thead>
          <tbody id="items-body"></tbody>
        </table>
      </div>
      <div class="add-item-row">
        <button class="btn btn-outline btn-sm" onclick="addItem()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          Add Item
        </button>
      </div>

      <!-- Discount / Tax -->
      <div class="discount-tax-row" style="margin-top: 20px; padding-top:16px; border-top:1px solid var(--border);">
        <div class="field">
          <label>Discount (%)</label>
          <input type="number" id="discount" min="0" max="100" step="0.1" value="0" oninput="recalculate()"/>
        </div>
        <div class="field">
          <label>Tax / VAT (%)</label>
          <input type="number" id="tax" min="0" max="100" step="0.1" value="0" oninput="recalculate()"/>
        </div>
        <div class="field">
          <label>Shipping / Fees</label>
          <input type="number" id="shipping" min="0" step="0.01" value="0" oninput="recalculate()"/>
        </div>
      </div>

      <!-- Totals -->
      <div class="totals-box">
        <div class="totals-row"><span class="label">Subtotal</span><span class="value" id="subtotal-display">$0.00</span></div>
        <div class="totals-row discount-row" id="discount-row" style="display:none;"><span class="label">Discount</span><span class="value" style="color:var(--success);" id="discount-display">-$0.00</span></div>
        <hr class="totals-divider"/>
        <div class="totals-row tax-row" id="tax-row" style="display:none;"><span class="label">Tax / VAT</span><span class="value" id="tax-display">$0.00</span></div>
        <div class="totals-row shipping-row" id="shipping-row" style="display:none;"><span class="label">Shipping</span><span class="value" id="shipping-display">$0.00</span></div>
        <hr class="totals-divider"/>
        <div class="totals-row grand">
          <span class="label">Grand Total</span>
          <span class="value" id="grand-total-display">$0.00</span>
        </div>
      </div>
    </div>

    <!-- Notes & Actions -->
    <div class="grid-2" style="margin-top:20px;">
      <div class="card">
        <div class="card-title">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Notes &amp; Terms
        </div>
        <div class="field">
          <label>Payment Terms / Notes</label>
          <textarea id="notes" placeholder="Payment due within 30 days. Bank transfer preferred.&#10;Thank you for your business!" oninput="liveUpdate()" style="min-height:90px;"></textarea>
        </div>
      </div>
      <div class="card" style="display:flex;flex-direction:column;justify-content:center;gap:12px;">
        <div class="card-title">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Actions
        </div>
        <button class="btn btn-primary" onclick="switchTab('preview'); buildPreview();">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Preview Invoice
        </button>
        <button class="btn btn-outline" onclick="printInvoice()">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print Invoice
        </button>
        <button class="btn btn-accent" onclick="savePDF()">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          Save as PDF
        </button>
        <button class="btn btn-outline" onclick="saveTextFile()">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Export as Text
        </button>
      </div>
    </div>
  </div>

  <!-- Preview Tab -->
  <div class="tab-panel" id="preview-panel">
    <div style="display:flex;justify-content:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
      <button class="btn btn-outline" onclick="switchTab('editor')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4z"/></svg>
        Back to Editor
      </button>
      <button class="btn btn-primary" onclick="printInvoice()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print
      </button>
      <button class="btn btn-accent" onclick="savePDF()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        Save PDF
      </button>
      <button class="btn btn-success" onclick="saveInvoice()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/></svg>
        Save Invoice
      </button>
    </div>
    <div id="invoice-preview-output"></div>
  </div>

  <!-- Saved Tab -->
  <div class="tab-panel" id="saved-panel">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
        <div class="card-title" style="margin-bottom:0;">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          Saved Invoices
        </div>
        <button class="btn btn-danger btn-sm" onclick="clearAllSaved()" id="clear-all-btn" style="display:none;">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          Clear All
        </button>
      </div>
      <div id="saved-invoices-list"></div>
    </div>
  </div>

</div>

<script>
// ── State ──
let invoiceData = {
  items: [],
  invoiceNumber: '',
  nextNumber: 1,
};
let savedInvoices = JSON.parse(localStorage.getItem('invoices_v2') || '[]');
let currentEditId = null;

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  setDefaultDates();
  updateInvoiceNumber();
  addItem();
  addItem();
  updateSavedBadge();
  renderSavedList();
});

function setDefaultDates() {
  const today = new Date();
  const fmt = d => d.toISOString().split('T')[0];
  const due = new Date(today);
  due.setDate(due.getDate() + 30);
  document.getElementById('invoice-date').value = fmt(today);
  document.getElementById('due-date').value = fmt(due);
}

function getNextInvoiceNumber() {
  const nums = savedInvoices.map(inv => {
    const match = inv.invoiceNumber && inv.invoiceNumber.match(/(\d+)$/);
    return match ? parseInt(match[1], 10) : 0;
  });
  const max = nums.length ? Math.max(...nums) : 0;
  return max + 1;
}

function updateInvoiceNumber() {
  const n = getNextInvoiceNumber();
  const formatted = `INV-${String(n).padStart(3, '0')}`;
  document.getElementById('invoice-number').value = formatted;
  document.getElementById('inv-num-badge').textContent = formatted;
  document.getElementById('current-inv-label').textContent = `— ${formatted}`;
}

// ── Tab Switching ──
function switchTab(name) {
  ['editor','preview','saved'].forEach(t => {
    document.getElementById(`${t}-panel`).classList.toggle('active', t === name);
    document.getElementById(`tab-${t}`).classList.toggle('active', t === name);
  });
  if (name === 'preview') buildPreview();
  if (name === 'saved') renderSavedList();
}

// ── Items ──
function addItem(desc='', qty=1, price=0) {
  const id = Date.now() + Math.random();
  invoiceData.items.push({ id, desc, qty, price });
  renderItems();
  recalculate();
}

function removeItem(id) {
  invoiceData.items = invoiceData.items.filter(i => i.id !== id);
  renderItems();
  recalculate();
}

function renderItems() {
  const tbody = document.getElementById('items-body');
  tbody.innerHTML = '';
  invoiceData.items.forEach((item, idx) => {
    const total = (parseFloat(item.qty)||0) * (parseFloat(item.price)||0);
    const sym = getCurrency();
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="col-desc">
        <input type="text" placeholder="Item description…" value="${escHtml(item.desc)}"
          oninput="updateItem(${item.id},'desc',this.value)" />
      </td>
      <td class="col-qty">
        <input type="number" min="0" step="any" value="${item.qty}"
          oninput="updateItem(${item.id},'qty',this.value)" style="text-align:center;" />
      </td>
      <td class="col-price">
        <input type="number" min="0" step="0.01" value="${item.price}"
          oninput="updateItem(${item.id},'price',this.value)" />
      </td>
      <td class="col-total"><span class="line-total">${sym}${total.toFixed(2)}</span></td>
      <td class="col-action">
        ${invoiceData.items.length > 1 ? `<button class="btn btn-danger btn-icon btn-sm" onclick="removeItem(${item.id})" title="Remove">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>` : '<span style="display:inline-block;width:30px;"></span>'}
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function updateItem(id, field, val) {
  const item = invoiceData.items.find(i => i.id === id);
  if (item) { item[field] = val; recalculate(); }
}

// ── Calculations ──
function getCurrency() { return document.getElementById('currency').value; }

function recalculate() {
  const sym = getCurrency();
  const subtotal = invoiceData.items.reduce((s,i) => s + (parseFloat(i.qty)||0)*(parseFloat(i.price)||0), 0);
  const discPct = parseFloat(document.getElementById('discount').value) || 0;
  const taxPct  = parseFloat(document.getElementById('tax').value) || 0;
  const shipping = parseFloat(document.getElementById('shipping').value) || 0;

  const discAmt = subtotal * (discPct / 100);
  const afterDisc = subtotal - discAmt;
  const taxAmt = afterDisc * (taxPct / 100);
  const grand = afterDisc + taxAmt + shipping;

  document.getElementById('subtotal-display').textContent = `${sym}${subtotal.toFixed(2)}`;
  document.getElementById('discount-display').textContent = `-${sym}${discAmt.toFixed(2)}`;
  document.getElementById('tax-display').textContent = `${sym}${taxAmt.toFixed(2)}`;
  document.getElementById('shipping-display').textContent = `${sym}${shipping.toFixed(2)}`;
  document.getElementById('grand-total-display').textContent = `${sym}${grand.toFixed(2)}`;

  document.getElementById('discount-row').style.display = discPct > 0 ? '' : 'none';
  document.getElementById('tax-row').style.display = taxPct > 0 ? '' : 'none';
  document.getElementById('shipping-row').style.display = shipping > 0 ? '' : 'none';

  // update line totals in table
  const spans = document.querySelectorAll('.line-total');
  invoiceData.items.forEach((item, idx) => {
    const t = (parseFloat(item.qty)||0)*(parseFloat(item.price)||0);
    if (spans[idx]) spans[idx].textContent = `${sym}${t.toFixed(2)}`;
  });
}

function liveUpdate() {
  recalculate();
  const num = document.getElementById('invoice-number').value;
  document.getElementById('inv-num-badge').textContent = num || 'INV-???';
  document.getElementById('current-inv-label').textContent = `— ${num || 'New Invoice'}`;
}

// ── Preview ──
function buildPreview() {
  const sym = getCurrency();
  const subtotal = invoiceData.items.reduce((s,i)=>s+(parseFloat(i.qty)||0)*(parseFloat(i.price)||0),0);
  const discPct = parseFloat(document.getElementById('discount').value)||0;
  const taxPct  = parseFloat(document.getElementById('tax').value)||0;
  const shipping = parseFloat(document.getElementById('shipping').value)||0;
  const discAmt = subtotal*(discPct/100);
  const afterDisc = subtotal - discAmt;
  const taxAmt = afterDisc*(taxPct/100);
  const grand = afterDisc + taxAmt + shipping;

  const g = id => document.getElementById(id).value || '';

  const itemRows = invoiceData.items.filter(i => i.desc || parseFloat(i.price)).map((item,i) => {
    const total = (parseFloat(item.qty)||0)*(parseFloat(item.price)||0);
    return `<tr>
      <td style="padding:12px;font-size:.9rem;border-bottom:1px solid #f0f4f8;">${i+1}</td>
      <td style="padding:12px;font-size:.9rem;border-bottom:1px solid #f0f4f8;">${escHtml(item.desc)}</td>
      <td style="padding:12px;font-size:.9rem;border-bottom:1px solid #f0f4f8;text-align:center;color:#64748b;">${item.qty}</td>
      <td style="padding:12px;font-size:.9rem;border-bottom:1px solid #f0f4f8;text-align:center;color:#64748b;">${sym}${parseFloat(item.price||0).toFixed(2)}</td>
      <td style="padding:12px;font-size:.9rem;border-bottom:1px solid #f0f4f8;text-align:right;font-weight:600;">${sym}${total.toFixed(2)}</td>
    </tr>`;
  }).join('');

  const totalsRows = [
    `<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:.88rem;"><span style="color:#64748b;">Subtotal</span><span style="font-weight:600;">${sym}${subtotal.toFixed(2)}</span></div>`,
    discPct > 0 ? `<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:.88rem;"><span style="color:#64748b;">Discount (${discPct}%)</span><span style="font-weight:600;color:#10b981;">-${sym}${discAmt.toFixed(2)}</span></div>` : '',
    `<hr style="border:none;border-top:1px solid #e2e8f0;margin:8px 0;">`,
    taxPct > 0 ? `<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:.88rem;"><span style="color:#64748b;">Tax / VAT (${taxPct}%)</span><span style="font-weight:600;">${sym}${taxAmt.toFixed(2)}</span></div>` : '',
    shipping > 0 ? `<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:.88rem;"><span style="color:#64748b;">Shipping</span><span style="font-weight:600;">${sym}${shipping.toFixed(2)}</span></div>` : '',
    `<hr style="border:none;border-top:1px solid #e2e8f0;margin:8px 0;">`,
    `<div style="display:flex;justify-content:space-between;padding:10px 14px;background:#4f46e5;border-radius:8px;margin-top:6px;">
      <span style="color:#fff;font-weight:800;font-size:1rem;">TOTAL DUE</span>
      <span style="color:#fff;font-weight:800;font-size:1rem;">${sym}${grand.toFixed(2)}</span>
    </div>`,
  ].join('');

  const notesHtml = g('notes') ? `
    <div style="font-size:.84rem;color:#64748b;border-top:1px solid #e2e8f0;padding-top:20px;line-height:1.7;margin-top:20px;">
      <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;margin-bottom:5px;">Notes &amp; Terms</div>
      ${escHtml(g('notes')).replace(/\n/g,'<br>')}
    </div>` : '';

  const html = `
  <div class="invoice-preview" id="printable-invoice">
    <div class="inv-header">
      <div>
        <div class="inv-company-name">${escHtml(g('company-name')) || 'Your Company'}</div>
        <div class="inv-company-info">${escHtml(g('company-info')).replace(/\n/g,'<br>')}</div>
        ${g('company-email') ? `<div style="font-size:.83rem;color:#64748b;margin-top:3px;">${escHtml(g('company-email'))}</div>` : ''}
        ${g('company-website') ? `<div style="font-size:.83rem;color:#64748b;">${escHtml(g('company-website'))}</div>` : ''}
      </div>
      <div class="inv-badge">
        <div class="inv-title">Invoice</div>
        <div class="inv-number">${escHtml(g('invoice-number')) || 'INV-001'}</div>
        <div class="inv-date">Date: ${formatDate(g('invoice-date'))}</div>
        ${g('due-date') ? `<div class="inv-date">Due: ${formatDate(g('due-date'))}</div>` : ''}
        <div style="margin-top:10px;">
          <span class="status-badge status-draft">Draft</span>
        </div>
      </div>
    </div>

    <hr class="inv-divider">

    <div class="inv-meta">
      <div class="inv-meta-block">
        <div class="label">Bill To</div>
        <div class="value">${escHtml(g('client-name')) || '—'}</div>
        ${g('client-email') ? `<div class="sub">${escHtml(g('client-email'))}</div>` : ''}
        ${g('client-address') ? `<div class="sub" style="white-space:pre-line;">${escHtml(g('client-address'))}</div>` : ''}
      </div>
      <div class="inv-meta-block" style="text-align:right;">
        <div class="label">Invoice Summary</div>
        <div class="value" style="font-size:1.4rem;color:var(--primary);font-weight:900;">${sym}${grand.toFixed(2)}</div>
        <div class="sub">Due ${formatDate(g('due-date')) || '—'}</div>
      </div>
    </div>

    <table class="inv-table">
      <thead>
        <tr>
          <th style="width:40px;">#</th>
          <th>Description</th>
          <th style="text-align:center;width:70px;">Qty</th>
          <th style="text-align:center;width:110px;">Unit Price</th>
          <th style="text-align:right;width:110px;">Total</th>
        </tr>
      </thead>
      <tbody>${itemRows}</tbody>
    </table>

    <div class="inv-totals">
      <div class="inv-totals-inner">${totalsRows}</div>
    </div>

    ${notesHtml}

    <div class="inv-footer">Thank you for your business! &bull; Generated by Invoice Builder</div>
  </div>`;

  document.getElementById('invoice-preview-output').innerHTML = html;
}

// ── Save / Load ──
function collectFormData() {
  const g = id => document.getElementById(id).value || '';
  return {
    id: currentEditId || Date.now(),
    invoiceNumber: g('invoice-number'),
    invoiceDate: g('invoice-date'),
    dueDate: g('due-date'),
    currency: g('currency'),
    companyName: g('company-name'),
    companyInfo: g('company-info'),
    companyEmail: g('company-email'),
    companyWebsite: g('company-website'),
    clientName: g('client-name'),
    clientEmail: g('client-email'),
    clientAddress: g('client-address'),
    discount: g('discount'),
    tax: g('tax'),
    shipping: g('shipping'),
    notes: g('notes'),
    items: JSON.parse(JSON.stringify(invoiceData.items)),
    savedAt: new Date().toISOString(),
  };
}

function saveInvoice() {
  const data = collectFormData();
  if (!data.invoiceNumber) { showToast('Please enter an invoice number', 'error'); return; }
  const idx = savedInvoices.findIndex(i => i.id === data.id);
  if (idx >= 0) savedInvoices[idx] = data;
  else savedInvoices.push(data);
  localStorage.setItem('invoices_v2', JSON.stringify(savedInvoices));
  currentEditId = data.id;
  updateSavedBadge();
  showToast(`Invoice ${data.invoiceNumber} saved!`, 'success');
}

function loadInvoice(id) {
  const inv = savedInvoices.find(i => i.id === id);
  if (!inv) return;
  currentEditId = inv.id;

  const s = (elId, val) => { const el = document.getElementById(elId); if (el) el.value = val || ''; };
  s('invoice-number', inv.invoiceNumber);
  s('invoice-date', inv.invoiceDate);
  s('due-date', inv.dueDate);
  s('currency', inv.currency || '$');
  s('company-name', inv.companyName);
  s('company-info', inv.companyInfo);
  s('company-email', inv.companyEmail);
  s('company-website', inv.companyWebsite);
  s('client-name', inv.clientName);
  s('client-email', inv.clientEmail);
  s('client-address', inv.clientAddress);
  s('discount', inv.discount || '0');
  s('tax', inv.tax || '0');
  s('shipping', inv.shipping || '0');
  s('notes', inv.notes);

  invoiceData.items = inv.items || [];
  renderItems();
  recalculate();
  liveUpdate();
  switchTab('editor');
  showToast(`Loaded ${inv.invoiceNumber}`, 'success');
}

function deleteInvoice(id) {
  savedInvoices = savedInvoices.filter(i => i.id !== id);
  localStorage.setItem('invoices_v2', JSON.stringify(savedInvoices));
  updateSavedBadge();
  renderSavedList();
  showToast('Invoice deleted', 'error');
}

function newInvoice() {
  currentEditId = null;
  invoiceData.items = [];
  ['invoice-number','company-name','company-info','company-email','company-website',
   'client-name','client-email','client-address','notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  ['discount','tax','shipping'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '0';
  });
  setDefaultDates();
  updateInvoiceNumber();
  addItem();
  addItem();
  recalculate();
  switchTab('editor');
  showToast('New invoice started');
}

function clearAllSaved() {
  if (!confirm('Delete ALL saved invoices? This cannot be undone.')) return;
  savedInvoices = [];
  localStorage.setItem('invoices_v2', JSON.stringify(savedInvoices));
  updateSavedBadge();
  renderSavedList();
  showToast('All invoices cleared');
}

// ── Render Saved List ──
function renderSavedList() {
  const container = document.getElementById('saved-invoices-list');
  const clearBtn = document.getElementById('clear-all-btn');
  if (!savedInvoices.length) {
    container.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 12px;display:block;"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p>No saved invoices yet.<br>Create and save your first one!</p>
    </div>`;
    clearBtn.style.display = 'none';
    return;
  }
  clearBtn.style.display = '';
  const sorted = [...savedInvoices].sort((a,b) => new Date(b.savedAt)-new Date(a.savedAt));
  container.innerHTML = sorted.map(inv => {
    const sym = inv.currency || '$';
    const subtotal = (inv.items||[]).reduce((s,i)=>s+(parseFloat(i.qty)||0)*(parseFloat(i.price)||0),0);
    const disc = subtotal*(parseFloat(inv.discount||0)/100);
    const afterDisc = subtotal - disc;
    const tax = afterDisc*(parseFloat(inv.tax||0)/100);
    const grand = afterDisc + tax + parseFloat(inv.shipping||0);
    return `<div class="saved-item">
      <div class="saved-item-info">
        <div class="inv-num">${escHtml(inv.invoiceNumber)}</div>
        <div class="client">${escHtml(inv.clientName || 'No client')} &bull; ${formatDate(inv.invoiceDate)}</div>
        <div class="amount">${sym}${grand.toFixed(2)}</div>
      </div>
      <div class="saved-item-actions">
        <button class="btn btn-outline btn-sm" onclick="loadInvoice(${inv.id})">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4z"/></svg>
          Edit
        </button>
        <button class="btn btn-accent btn-sm" onclick="loadAndPreview(${inv.id})">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          View
        </button>
        <button class="btn btn-danger btn-sm" onclick="deleteInvoice(${inv.id})">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          Del
        </button>
      </div>
    </div>`;
  }).join('');
}

function loadAndPreview(id) {
  loadInvoice(id);
  setTimeout(() => switchTab('preview'), 50);
}

function updateSavedBadge() {
  const badge = document.getElementById('saved-count-badge');
  badge.textContent = savedInvoices.length || '';
}

// ── Print / Export ──
function printInvoice() {
  buildPreview();
  setTimeout(() => window.print(), 150);
}

function savePDF() {
  buildPreview();
  showToast('Opening print dialog — choose "Save as PDF"');
  setTimeout(() => window.print(), 200);
}

function saveTextFile() {
  const g = id => document.getElementById(id).value || '';
  const sym = getCurrency();
  const subtotal = invoiceData.items.reduce((s,i)=>s+(parseFloat(i.qty)||0)*(parseFloat(i.price)||0),0);
  const discPct = parseFloat(g('discount'))||0;
  const taxPct = parseFloat(g('tax'))||0;
  const shipping = parseFloat(g('shipping'))||0;
  const discAmt = subtotal*(discPct/100);
  const afterDisc = subtotal-discAmt;
  const taxAmt = afterDisc*(taxPct/100);
  const grand = afterDisc+taxAmt+shipping;

  const sep = '─'.repeat(60);
  let txt = `INVOICE\n${sep}\n`;
  txt += `Invoice #: ${g('invoice-number')}\n`;
  txt += `Date: ${formatDate(g('invoice-date'))}\n`;
  if (g('due-date')) txt += `Due Date: ${formatDate(g('due-date'))}\n`;
  txt += `\n${sep}\n`;
  txt += `FROM:\n${g('company-name')}\n${g('company-info')}\n`;
  if (g('company-email')) txt += `${g('company-email')}\n`;
  if (g('company-website')) txt += `${g('company-website')}\n`;
  txt += `\nTO:\n${g('client-name')}\n`;
  if (g('client-email')) txt += `${g('client-email')}\n`;
  if (g('client-address')) txt += `${g('client-address')}\n`;
  txt += `\n${sep}\nITEMS:\n`;
  txt += `${'Description'.padEnd(30)} ${'Qty'.padEnd(8)} ${'Price'.padEnd(12)} Total\n`;
  txt += `${'-'.repeat(60)}\n`;
  invoiceData.items.filter(i=>i.desc||parseFloat(i.price)).forEach(item => {
    const total = (parseFloat(item.qty)||0)*(parseFloat(item.price)||0);
    txt += `${item.desc.padEnd(30)} ${String(item.qty).padEnd(8)} ${(sym+parseFloat(item.price||0).toFixed(2)).padEnd(12)} ${sym}${total.toFixed(2)}\n`;
  });
  txt += `${sep}\n`;
  txt += `Subtotal: ${sym}${subtotal.toFixed(2)}\n`;
  if (discPct>0) txt += `Discount (${discPct}%): -${sym}${discAmt.toFixed(2)}\n`;
  if (taxPct>0) txt += `Tax (${taxPct}%): ${sym}${taxAmt.toFixed(2)}\n`;
  if (shipping>0) txt += `Shipping: ${sym}${shipping.toFixed(2)}\n`;
  txt += `GRAND TOTAL: ${sym}${grand.toFixed(2)}\n`;
  if (g('notes')) txt += `\n${sep}\nNOTES:\n${g('notes')}\n`;
  txt += `\n${sep}\nGenerated by Invoice Builder\n`;

  const blob = new Blob([txt], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${g('invoice-number') || 'invoice'}.txt`;
  a.click();
  showToast('Text file downloaded!', 'success');
}

// ── Utilities ──
function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
}

function showToast(msg, type='') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  const icon = type==='success' ? '✓' : type==='error' ? '✕' : 'ℹ';
  toast.innerHTML = `<span>${icon}</span> ${msg}`;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity='0'; toast.style.transition='opacity .3s'; setTimeout(()=>toast.remove(),300); }, 2800);
}
</script>
