<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoteKeeper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14,2 14,8 20,8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10,9 9,9 8,9"/>
        </svg>
        <span>NoteKeeper</span>
      </div>
      <button class="btn-icon sidebar-close" id="sidebarClose" title="Close sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="sidebar-actions">
      <button class="btn-primary" id="newNoteBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New Note
      </button>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search notes..." />
      <button class="btn-icon search-clear" id="searchClear" style="display:none;" title="Clear search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="notes-list-header">
      <span id="notesCount">0 notes</span>
      <div class="sort-wrap">
        <select id="sortSelect" title="Sort notes">
          <option value="modified">Last modified</option>
          <option value="created">Date created</option>
          <option value="title">Title A-Z</option>
        </select>
      </div>
    </div>

    <div class="notes-list" id="notesList">
      <div class="empty-state" id="emptyList">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14,2 14,8 20,8"/>
        </svg>
        <p>No notes yet.<br/>Click <strong>New Note</strong> to start.</p>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main" id="main">
    <!-- Topbar (mobile) -->
    <div class="topbar">
      <button class="btn-icon" id="menuToggle" title="Open sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="topbar-title">NoteKeeper</span>
      <button class="btn-icon" id="newNoteMobile" title="New note">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- Welcome screen -->
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-inner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14,2 14,8 20,8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <h2>Select or create a note</h2>
        <p>Your thoughts, organized.</p>
        <button class="btn-primary" id="welcomeNewNote">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New Note
        </button>
      </div>
    </div>

    <!-- Note editor -->
    <div class="editor" id="editor" style="display:none;">
      <div class="editor-toolbar">
        <div class="toolbar-left">
          <div class="color-picker" id="colorPicker">
            <button class="color-btn active" data-color="default" style="background:#ffffff" title="Default"></button>
            <button class="color-btn" data-color="yellow"  style="background:#fef3c7" title="Yellow"></button>
            <button class="color-btn" data-color="green"   style="background:#d1fae5" title="Green"></button>
            <button class="color-btn" data-color="blue"    style="background:#dbeafe" title="Blue"></button>
            <button class="color-btn" data-color="pink"    style="background:#fce7f3" title="Pink"></button>
            <button class="color-btn" data-color="purple"  style="background:#ede9fe" title="Purple"></button>
            <button class="color-btn" data-color="orange"  style="background:#ffedd5" title="Orange"></button>
            <button class="color-btn" data-color="red"     style="background:#fee2e2" title="Red"></button>
          </div>
        </div>

        <div class="toolbar-right">
          <button class="btn-icon pin-btn" id="pinBtn" title="Pin note">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
          </button>
          <button class="btn-icon export-btn" id="exportBtn" title="Export as .txt">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7,10 12,15 17,10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </button>
          <button class="btn-icon delete-btn" id="deleteBtn" title="Delete note">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3,6 5,6 21,6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6"/><path d="M14 11v6"/>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="editor-body" id="editorBody">
        <input type="text" class="note-title-input" id="noteTitleInput" placeholder="Note title..." maxlength="120" />
        <div class="note-timestamps" id="noteTimestamps"></div>
        <textarea class="note-content-input" id="noteContentInput" placeholder="Start writing..."></textarea>
      </div>
    </div>
  </main>

  <!-- Delete confirmation modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3,6 5,6 21,6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/>
        </svg>
      </div>
      <h3>Delete note?</h3>
      <p>This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn-secondary" id="cancelDelete">Cancel</button>
        <button class="btn-danger" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <!-- Sidebar overlay for mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script src="app.js"></script>
</body>
</html>
