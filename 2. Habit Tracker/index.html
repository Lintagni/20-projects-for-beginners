<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">&#9679;</span>
        <h1>Habit Tracker</h1>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="achievementsBtn" title="Achievements" aria-label="Achievements">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>
        </button>
        <button class="btn-icon" id="themeToggle" title="Toggle theme" aria-label="Toggle dark/light mode">
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <!-- Add Habit Form -->
    <section class="add-section card">
      <h2 class="section-title">Add New Habit</h2>
      <form id="addHabitForm" class="add-form">
        <input
          type="text"
          id="habitInput"
          class="input"
          placeholder="e.g., Drink 8 glasses of water"
          maxlength="60"
          autocomplete="off"
          required
        />
        <button type="submit" class="btn btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Habit
        </button>
      </form>
    </section>

    <!-- Date Header -->
    <div class="date-header">
      <div class="date-display">
        <span id="todayLabel" class="today-label"></span>
        <span id="todayDate" class="today-date"></span>
      </div>
      <div class="view-tabs">
        <button class="tab-btn active" data-view="today">Today</button>
        <button class="tab-btn" data-view="calendar">Calendar</button>
      </div>
    </div>

    <!-- Today View -->
    <section id="todayView" class="view-section">
      <div id="habitsList" class="habits-list">
        <!-- Habits rendered here -->
      </div>
      <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </div>
        <p class="empty-title">No habits yet</p>
        <p class="empty-sub">Add your first habit above to get started!</p>
      </div>
    </section>

    <!-- Calendar View -->
    <section id="calendarView" class="view-section hidden">
      <div class="calendar-header">
        <button class="btn-icon" id="prevMonth" aria-label="Previous month">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <h2 id="calendarTitle" class="calendar-month"></h2>
        <button class="btn-icon" id="nextMonth" aria-label="Next month">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="calendar-habit-select">
        <label for="calendarHabitSelect" class="select-label">Habit:</label>
        <select id="calendarHabitSelect" class="select"></select>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
      <div class="calendar-legend">
        <span class="legend-item"><span class="legend-dot completed"></span> Completed</span>
        <span class="legend-item"><span class="legend-dot missed"></span> Missed</span>
        <span class="legend-item"><span class="legend-dot future"></span> Future</span>
      </div>
    </section>
  </main>

  <!-- Edit Modal -->
  <div id="editModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <h3 id="editModalTitle" class="modal-title">Edit Habit</h3>
      <input type="text" id="editInput" class="input" maxlength="60" />
      <div class="modal-actions">
        <button class="btn btn-ghost" id="editCancel">Cancel</button>
        <button class="btn btn-primary" id="editSave">Save</button>
      </div>
    </div>
  </div>

  <!-- Achievements Modal -->
  <div id="achievementsModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="achievementsTitle">
    <div class="modal-backdrop"></div>
    <div class="modal-box achievements-box">
      <div class="modal-header">
        <h3 id="achievementsTitle" class="modal-title">Achievements</h3>
        <button class="btn-icon" id="achievementsClose" aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="achievementsList" class="achievements-list"></div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div id="deleteModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <h3 id="deleteModalTitle" class="modal-title">Delete Habit</h3>
      <p class="modal-text">Are you sure you want to delete <strong id="deleteHabitName"></strong>? This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="deleteCancel">Cancel</button>
        <button class="btn btn-danger" id="deleteConfirm">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden" role="alert" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
