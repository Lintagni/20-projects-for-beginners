<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222636;
      --border: #2e3347;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --text: #e2e8f0;
      --muted: #8892a4;
      --danger: #f87171;
      --success: #34d399;

      --food: #f97316;
      --transport: #3b82f6;
      --entertainment: #a855f7;
      --shopping: #ec4899;
      --other: #14b8a6;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* ── Layout ─────────────────────────────────── */
    .app { max-width: 1100px; margin: 0 auto; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent2);
    }

    .logo svg { flex-shrink: 0; }

    .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    .grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
    }

    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }

    /* ── Cards ──────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }

    .card-title {
      font-size: .85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── Stats row ──────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    @media (max-width: 560px) { .stats { grid-template-columns: 1fr; } }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
    }

    .stat-label { font-size: .78rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    .stat-value { font-size: 1.55rem; font-weight: 700; }
    .stat-sub   { font-size: .78rem; color: var(--muted); margin-top: 4px; }

    /* ── Form ───────────────────────────────────── */
    .form-group { margin-bottom: 14px; }

    label { display: block; font-size: .82rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; }

    input, select, textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus { border-color: var(--accent); }

    select option { background: var(--surface2); }

    textarea { resize: vertical; min-height: 70px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .18s, transform .12s;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn:active { transform: scale(.96); }
    .btn:hover  { opacity: .88; }

    .btn-primary { background: var(--accent); color: #fff; width: 100%; padding: 12px; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-danger  { background: transparent; border: 1px solid var(--border); color: var(--danger); padding: 6px 10px; font-size: .8rem; }

    /* ── Filters ─────────────────────────────────── */
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: center;
    }

    .filters select { width: auto; flex: 1; min-width: 130px; }

    .chip {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 600;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .18s;
    }

    .chip.active, .chip:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Expense list ───────────────────────────── */
    .expense-list { display: flex; flex-direction: column; gap: 10px; }

    .expense-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: border-color .18s;
    }

    .expense-item:hover { border-color: var(--accent); }

    .cat-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .expense-info { flex: 1; min-width: 0; }

    .expense-desc {
      font-size: .9rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .expense-meta { font-size: .76rem; color: var(--muted); margin-top: 3px; }

    .expense-amount {
      font-weight: 700;
      font-size: 1rem;
      color: var(--danger);
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }

    .empty-state svg { opacity: .3; margin-bottom: 12px; }
    .empty-state p   { font-size: .9rem; }

    /* ── Charts ─────────────────────────────────── */
    .chart-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    canvas { display: block; width: 100% !important; }

    /* ── Category breakdown ─────────────────────── */
    .breakdown { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }

    .breakdown-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .85rem;
    }

    .breakdown-label { width: 110px; color: var(--muted); flex-shrink: 0; font-weight: 500; }
    .breakdown-bar-wrap { flex: 1; background: var(--surface2); border-radius: 4px; height: 8px; overflow: hidden; }
    .breakdown-bar { height: 100%; border-radius: 4px; transition: width .4s; }
    .breakdown-amount { width: 80px; text-align: right; font-weight: 600; flex-shrink: 0; }

    /* ── Month picker ───────────────────────────── */
    .month-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .month-nav button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 1rem; }
    .month-nav button:hover { border-color: var(--accent); }
    .month-label { font-weight: 600; flex: 1; text-align: center; }

    /* ── Toast ──────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: .88rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      transform: translateY(80px);
      opacity: 0;
      transition: all .3s;
      z-index: 999;
    }

    #toast.show { transform: translateY(0); opacity: 1; }

    /* ── Scrollbar ──────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
        <path d="M12 6v6l4 2"/>
      </svg>
      Expense Tracker
    </div>
    <div class="header-actions">
      <button class="btn btn-outline" onclick="exportCSV()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
        </svg>
        Export CSV
      </button>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total Spent</div>
      <div class="stat-value" id="totalSpent">$0.00</div>
      <div class="stat-sub" id="totalCount">0 expenses</div>
    </div>
    <div class="stat">
      <div class="stat-label">This Month</div>
      <div class="stat-value" id="monthTotal">$0.00</div>
      <div class="stat-sub" id="monthName">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Top Category</div>
      <div class="stat-value" id="topCat" style="font-size:1.1rem">—</div>
      <div class="stat-sub" id="topCatAmount">—</div>
    </div>
  </div>

  <div class="grid">

    <!-- Left: Add form -->
    <div>
      <div class="card">
        <div class="card-title">Add Expense</div>
        <form id="expenseForm">
          <div class="form-group">
            <label>Amount ($)</label>
            <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" required />
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="category" required>
              <option value="">Select category</option>
              <option value="Food">🍔 Food</option>
              <option value="Transport">🚗 Transport</option>
              <option value="Entertainment">🎬 Entertainment</option>
              <option value="Shopping">🛍️ Shopping</option>
              <option value="Other">📦 Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Description</label>
            <input type="text" id="description" placeholder="What did you spend on?" maxlength="100" required />
          </div>
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="date" required />
          </div>
          <button type="submit" class="btn btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            Add Expense
          </button>
        </form>
      </div>

      <!-- Category Breakdown -->
      <div class="card" style="margin-top:20px">
        <div class="card-title">Category Breakdown</div>
        <div class="breakdown" id="breakdown"></div>
      </div>
    </div>

    <!-- Right: Chart + List -->
    <div style="display:flex;flex-direction:column;gap:20px;">

      <!-- Chart -->
      <div class="card">
        <div class="card-title">Spending Chart</div>
        <div class="chart-tabs">
          <button class="chip active" id="tabPie" onclick="switchChart('pie')">Pie</button>
          <button class="chip" id="tabBar" onclick="switchChart('bar')">Bar</button>
        </div>
        <canvas id="chart" height="220"></canvas>
      </div>

      <!-- Monthly View -->
      <div class="card">
        <div class="card-title">Monthly View</div>
        <div class="month-nav">
          <button onclick="changeMonth(-1)">&#8592;</button>
          <div class="month-label" id="monthLabel">—</div>
          <button onclick="changeMonth(1)">&#8594;</button>
        </div>
        <div style="font-size:.85rem;color:var(--muted);margin-bottom:14px;">
          Monthly Total: <span id="monthViewTotal" style="color:var(--text);font-weight:600">$0.00</span>
        </div>

        <!-- Filters -->
        <div class="filters">
          <select id="filterCat" onchange="renderList()">
            <option value="">All Categories</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Shopping">Shopping</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <!-- Expense list -->
        <div class="expense-list" id="expenseList"></div>
      </div>

    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Data ─────────────────────────────────────────
const STORAGE_KEY = 'expense_tracker_v1';

const CAT_COLORS = {
  Food:          '#f97316',
  Transport:     '#3b82f6',
  Entertainment: '#a855f7',
  Shopping:      '#ec4899',
  Other:         '#14b8a6',
};

const CAT_ICONS = {
  Food: '🍔', Transport: '🚗', Entertainment: '🎬', Shopping: '🛍️', Other: '📦'
};

let expenses = [];
let currentChart = 'pie';
let viewMonth; // { year, month } (0-indexed month)

// ── Init ─────────────────────────────────────────
(function init() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) expenses = JSON.parse(saved);

  const now = new Date();
  viewMonth = { year: now.getFullYear(), month: now.getMonth() };

  // Default date = today
  document.getElementById('date').value = now.toISOString().slice(0, 10);

  document.getElementById('expenseForm').addEventListener('submit', addExpense);

  renderAll();
})();

// ── Persistence ───────────────────────────────────
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
}

// ── Add ───────────────────────────────────────────
function addExpense(e) {
  e.preventDefault();
  const amount      = parseFloat(document.getElementById('amount').value);
  const category    = document.getElementById('category').value;
  const description = document.getElementById('description').value.trim();
  const date        = document.getElementById('date').value;

  if (!amount || !category || !description || !date) return;

  const expense = {
    id: Date.now(),
    amount,
    category,
    description,
    date,
  };

  expenses.push(expense);
  save();

  // Jump to the month of the added expense
  const d = new Date(date + 'T00:00:00');
  viewMonth = { year: d.getFullYear(), month: d.getMonth() };

  renderAll();
  e.target.reset();
  document.getElementById('date').value = new Date().toISOString().slice(0, 10);
  toast('Expense added!');
}

// ── Delete ────────────────────────────────────────
function deleteExpense(id) {
  expenses = expenses.filter(ex => ex.id !== id);
  save();
  renderAll();
  toast('Expense deleted.');
}

// ── Render all ────────────────────────────────────
function renderAll() {
  renderStats();
  renderBreakdown();
  renderChart();
  renderList();
  updateMonthLabel();
}

// ── Stats ─────────────────────────────────────────
function renderStats() {
  const total = expenses.reduce((s, ex) => s + ex.amount, 0);
  document.getElementById('totalSpent').textContent = fmt(total);
  document.getElementById('totalCount').textContent = expenses.length + ' expense' + (expenses.length !== 1 ? 's' : '');

  // This month
  const now = new Date();
  const monthExp = expenses.filter(ex => {
    const d = new Date(ex.date + 'T00:00:00');
    return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
  });
  const monthTotal = monthExp.reduce((s, ex) => s + ex.amount, 0);
  document.getElementById('monthTotal').textContent = fmt(monthTotal);
  document.getElementById('monthName').textContent = now.toLocaleString('default', { month: 'long', year: 'numeric' });

  // Top category (all time)
  const bycat = catTotals(expenses);
  const topEntry = Object.entries(bycat).sort((a, b) => b[1] - a[1])[0];
  if (topEntry) {
    document.getElementById('topCat').textContent = CAT_ICONS[topEntry[0]] + ' ' + topEntry[0];
    document.getElementById('topCatAmount').textContent = fmt(topEntry[1]);
  } else {
    document.getElementById('topCat').textContent = '—';
    document.getElementById('topCatAmount').textContent = '—';
  }
}

// ── Breakdown ─────────────────────────────────────
function renderBreakdown() {
  const el = document.getElementById('breakdown');
  const bycat = catTotals(expenses);
  const total = Object.values(bycat).reduce((s, v) => s + v, 0);
  const sorted = Object.entries(bycat).sort((a, b) => b[1] - a[1]);

  if (!sorted.length) {
    el.innerHTML = '<div style="color:var(--muted);font-size:.85rem;text-align:center;padding:12px 0">No data yet</div>';
    return;
  }

  el.innerHTML = sorted.map(([cat, amt]) => `
    <div class="breakdown-row">
      <div class="breakdown-label">${CAT_ICONS[cat]} ${cat}</div>
      <div class="breakdown-bar-wrap">
        <div class="breakdown-bar" style="width:${total ? (amt/total*100).toFixed(1) : 0}%;background:${CAT_COLORS[cat]}"></div>
      </div>
      <div class="breakdown-amount">${fmt(amt)}</div>
    </div>
  `).join('');
}

// ── Chart ─────────────────────────────────────────
function switchChart(type) {
  currentChart = type;
  document.getElementById('tabPie').classList.toggle('active', type === 'pie');
  document.getElementById('tabBar').classList.toggle('active', type === 'bar');
  renderChart();
}

function renderChart() {
  const canvas = document.getElementById('chart');
  const ctx    = canvas.getContext('2d');
  const dpr    = window.devicePixelRatio || 1;
  const W      = canvas.parentElement.clientWidth - 40;
  const H      = 220;

  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const bycat = catTotals(expenses);
  const entries = Object.entries(bycat).sort((a, b) => b[1] - a[1]);
  const total = entries.reduce((s, [, v]) => s + v, 0);

  if (!total) {
    ctx.fillStyle = '#8892a4';
    ctx.font = '14px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('No expenses yet', W / 2, H / 2);
    return;
  }

  if (currentChart === 'pie') drawPie(ctx, W, H, entries, total);
  else drawBar(ctx, W, H, entries, total);
}

function drawPie(ctx, W, H, entries, total) {
  const cx = W / 2 - 60, cy = H / 2, r = Math.min(cx, cy) - 10;
  let angle = -Math.PI / 2;

  entries.forEach(([cat, amt]) => {
    const slice = (amt / total) * 2 * Math.PI;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, angle, angle + slice);
    ctx.closePath();
    ctx.fillStyle = CAT_COLORS[cat];
    ctx.fill();
    ctx.strokeStyle = '#0f1117';
    ctx.lineWidth = 2;
    ctx.stroke();
    angle += slice;
  });

  // Centre hole
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.52, 0, 2 * Math.PI);
  ctx.fillStyle = '#1a1d27';
  ctx.fill();

  // Centre text
  ctx.fillStyle = '#e2e8f0';
  ctx.font = 'bold 14px Segoe UI';
  ctx.textAlign = 'center';
  ctx.fillText('Total', cx, cy - 8);
  ctx.font = 'bold 13px Segoe UI';
  ctx.fillStyle = '#a78bfa';
  ctx.fillText(fmt(total), cx, cy + 10);

  // Legend
  const lx = W / 2 + 30, ly0 = H / 2 - (entries.length * 22) / 2;
  entries.forEach(([cat, amt], i) => {
    const y = ly0 + i * 22;
    ctx.fillStyle = CAT_COLORS[cat];
    ctx.beginPath(); ctx.arc(lx + 7, y + 6, 5, 0, 2 * Math.PI); ctx.fill();
    ctx.fillStyle = '#8892a4';
    ctx.font = '11px Segoe UI';
    ctx.textAlign = 'left';
    ctx.fillText(cat, lx + 18, y + 10);
    ctx.fillStyle = '#e2e8f0';
    ctx.font = 'bold 11px Segoe UI';
    ctx.textAlign = 'right';
    ctx.fillText(fmt(amt), lx + 120, y + 10);
  });
}

function drawBar(ctx, W, H, entries, total) {
  const pad   = { t: 20, r: 20, b: 40, l: 60 };
  const cw    = W - pad.l - pad.r;
  const ch    = H - pad.t - pad.b;
  const max   = entries[0][1];
  const bw    = Math.min(48, cw / entries.length - 10);
  const gap   = (cw - entries.length * bw) / (entries.length + 1);

  // Y grid
  ctx.strokeStyle = '#2e3347';
  ctx.lineWidth   = 1;
  [0, .25, .5, .75, 1].forEach(t => {
    const y = pad.t + ch * (1 - t);
    ctx.beginPath();
    ctx.moveTo(pad.l, y);
    ctx.lineTo(pad.l + cw, y);
    ctx.stroke();
    ctx.fillStyle = '#8892a4';
    ctx.font = '10px Segoe UI';
    ctx.textAlign = 'right';
    ctx.fillText(fmt(max * t), pad.l - 6, y + 4);
  });

  entries.forEach(([cat, amt], i) => {
    const x = pad.l + gap + i * (bw + gap);
    const bh = (amt / max) * ch;
    const y  = pad.t + ch - bh;

    // Bar
    ctx.fillStyle = CAT_COLORS[cat];
    roundRect(ctx, x, y, bw, bh, 5);

    // Amount label
    ctx.fillStyle = '#e2e8f0';
    ctx.font = 'bold 10px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(fmt(amt), x + bw / 2, y - 5);

    // Category label
    ctx.fillStyle = '#8892a4';
    ctx.font = '10px Segoe UI';
    ctx.fillText(cat, x + bw / 2, pad.t + ch + 16);
  });
}

function roundRect(ctx, x, y, w, h, r) {
  if (h <= 0) return;
  r = Math.min(r, h / 2, w / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h);
  ctx.lineTo(x, y + h);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

// ── List ──────────────────────────────────────────
function renderList() {
  const el       = document.getElementById('expenseList');
  const catFilter = document.getElementById('filterCat').value;

  const { year, month } = viewMonth;
  const filtered = expenses.filter(ex => {
    const d = new Date(ex.date + 'T00:00:00');
    if (d.getFullYear() !== year || d.getMonth() !== month) return false;
    if (catFilter && ex.category !== catFilter) return false;
    return true;
  });

  // Monthly total for view month (unfiltered by category)
  const monthExp = expenses.filter(ex => {
    const d = new Date(ex.date + 'T00:00:00');
    return d.getFullYear() === year && d.getMonth() === month;
  });
  const mTotal = monthExp.reduce((s, ex) => s + ex.amount, 0);
  document.getElementById('monthViewTotal').textContent = fmt(mTotal);

  if (!filtered.length) {
    el.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/>
        </svg>
        <p>No expenses for this period</p>
      </div>`;
    return;
  }

  // Sort newest first
  const sorted = [...filtered].sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);

  el.innerHTML = sorted.map(ex => `
    <div class="expense-item" id="exp-${ex.id}">
      <div class="cat-dot" style="background:${CAT_COLORS[ex.category]}"></div>
      <div class="expense-info">
        <div class="expense-desc">${escHtml(ex.description)}</div>
        <div class="expense-meta">${CAT_ICONS[ex.category]} ${ex.category} &bull; ${fmtDate(ex.date)}</div>
      </div>
      <div class="expense-amount">-${fmt(ex.amount)}</div>
      <button class="btn btn-danger" onclick="deleteExpense(${ex.id})" title="Delete">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
        </svg>
      </button>
    </div>
  `).join('');
}

// ── Month nav ─────────────────────────────────────
function updateMonthLabel() {
  const d = new Date(viewMonth.year, viewMonth.month, 1);
  document.getElementById('monthLabel').textContent = d.toLocaleString('default', { month: 'long', year: 'numeric' });
}

function changeMonth(delta) {
  let { year, month } = viewMonth;
  month += delta;
  if (month < 0)  { month = 11; year--; }
  if (month > 11) { month = 0;  year++; }
  viewMonth = { year, month };
  updateMonthLabel();
  renderList();
}

// ── Export CSV ────────────────────────────────────
function exportCSV() {
  if (!expenses.length) { toast('No expenses to export.'); return; }
  const header = 'Date,Category,Description,Amount';
  const rows   = expenses
    .sort((a, b) => a.date.localeCompare(b.date))
    .map(ex => `${ex.date},${ex.category},"${ex.description.replace(/"/g, '""')}",${ex.amount.toFixed(2)}`);
  const csv  = [header, ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `expenses_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('CSV exported!');
}

// ── Helpers ───────────────────────────────────────
function catTotals(arr) {
  return arr.reduce((acc, ex) => {
    acc[ex.category] = (acc[ex.category] || 0) + ex.amount;
    return acc;
  }, {});
}

function fmt(n) {
  return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function fmtDate(str) {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

// Redraw chart on resize
window.addEventListener('resize', () => renderChart());
</script>
</body>
